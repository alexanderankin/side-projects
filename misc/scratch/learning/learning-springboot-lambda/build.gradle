plugins {
    id 'spring-conventions'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.apache.httpcomponents.client5:httpclient5'

    // https://mvnrepository.com/artifact/com.amazonaws.serverless/aws-serverless-java-container-springboot3
    implementation 'com.amazonaws.serverless:aws-serverless-java-container-springboot3:2.1.5'

    // https://mvnrepository.com/artifact/com.amazonaws.serverless/aws-serverless-java-container-core
    testImplementation 'com.amazonaws.serverless:aws-serverless-java-container-core:2.1.5:tests'
}

def buildZip = tasks.register('buildZip', Zip) {
    from sourceSets.main.output
    from processResources
    into('lib') {
        from(configurations.runtimeClasspath) {
            exclude 'tomcat-embed-*'
        }
    }

    destinationDirectory = layout.buildDirectory.dir('lambda')
    archiveFileName = 'lambda.zip'
}

tasks.build.dependsOn buildZip
