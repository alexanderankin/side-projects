spring:
  application:
    name: discord-file-share
  datasource:
    url: jdbc:h2:./build/discord.h2:discord-file-share
    username: sa
    password:
  security:
    oauth2:
      client:
        provider:
          discord:
            authorization-uri: https://discord.com/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id
        registration:
          discord:
            provider: discord
            client-name: Discord
            client-id: ${DISCORD_CLIENT_ID}
            client-secret: ${DISCORD_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - identify
              - email
              - guilds
              - guilds.members.read

management:
  endpoints:
    web:
      exposure:
        include: health,info

file-share:
  root-directory: ${FILE_SHARE_ROOT:${user.home}/Downloads}
  discord:
    api-base-url: ${DISCORD_API_BASE_URL:https://discord.com/api}
    bot-token: ${DISCORD_BOT_TOKEN:}

  guilds:
    ${DISCORD_GUILD}:
      channels:
        - id: ${DISCORD_CHANNEL}
