databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: author
      changes:
        - createTable:
            tableName: note
            columns:
              - column:
                  name: id
                  type: java.util.UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created
                  type: java.sql.types.timestamp_with_timezone
                  constraints:
                    nullable: false
              - column:
                  name: updated
                  type: java.sql.types.timestamp_with_timezone
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: description
                  type: TEXT

        - createTable:
            tableName: tag
            columns:
              - column:
                  name: id
                  type: java.util.UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created
                  type: java.sql.types.timestamp_with_timezone
              - column:
                  name: updated
                  type: java.sql.types.timestamp_with_timezone
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: description
                  type: TEXT

        - createTable:
            tableName: block
            columns:
              - column:
                  name: id
                  type: java.util.UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created
                  type: java.sql.types.timestamp_with_timezone
                  constraints:
                    nullable: false
              - column:
                  name: updated
                  type: java.sql.types.timestamp_with_timezone
                  constraints:
                    nullable: false

              # relationship
              - column:
                  name: note_id
                  type: java.util.UUID
                  constraints:
                    nullable: false

              # ordering + payload
              - column:
                  name: ordinal
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT

        - createTable:
            tableName: block_tag
            columns:
              - column:
                  name: block_id
                  type: java.util.UUID
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: java.util.UUID
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: block
            baseColumnNames: note_id
            referencedTableName: note
            referencedColumnNames: id
            constraintName: fk_block_note
            onDelete: CASCADE

        # enforce "no duplicate ordinal per note"
        - addUniqueConstraint:
            tableName: block
            columnNames: note_id, ordinal
            constraintName: uq_block_note_ordinal

        # your primary query pattern: range scan by note + ordinal
        - createIndex:
            tableName: block
            indexName: idx_block_note_ordinal
            columns:
              - column:
                  name: note_id
              - column:
                  name: ordinal

        - addUniqueConstraint:
            tableName: block_tag
            columnNames: block_id, tag_id
            constraintName: uq_block_tag_block_tag
