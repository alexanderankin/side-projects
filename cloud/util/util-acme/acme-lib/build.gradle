plugins {
    id 'spring-conventions'
    id 'java-library'
    id 'java-test-fixtures'
}

dependencies {
    api 'org.apache.httpcomponents.client5:httpclient5'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-json'
    api 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.cloud:spring-cloud-starter-circuitbreaker-resilience4j'

    implementation 'org.bouncycastle:bcpkix-debug-jdk18on'
    implementation 'org.bouncycastle:bcprov-debug-jdk18on'
    // https://mvnrepository.com/artifact/com.google.crypto.tink/tink
    implementation 'com.google.crypto.tink:tink:1.20.0'
    implementation 'org.springframework.security:spring-security-oauth2-jose'
    implementation 'commons-codec:commons-codec'

    itestImplementation 'org.testcontainers:testcontainers'
    itestImplementation project(':cloud:util:util-acme-testcontainers:pebble')
}

configurations {
    testFixturesImplementation.extendsFrom implementation
}

dependencies {
    testFixturesImplementation 'org.junit.jupiter:junit-jupiter'
    testFixturesImplementation 'org.hamcrest:hamcrest'
}
