plugins {
    id 'spring-conventions'
}

dependencies {
    implementation project(':cloud:util:util-acme:acme-common')
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.cloud:spring-cloud-starter-circuitbreaker-resilience4j'


    // https://mvnrepository.com/artifact/com.github.mwiede/jsch // ssh
    implementation 'com.github.mwiede:jsch:2.27.7'

    itestImplementation 'org.testcontainers:testcontainers'
}
