plugins {
    id 'spring-conventions'
    id 'java-library'
    id 'maven-publish'
}

version = '0.0.1'

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-json'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.security:spring-security-oauth2-jose'

    implementation 'org.apache.httpcomponents.client5:httpclient5'
    implementation 'org.bouncycastle:bcpkix-debug-jdk18on'
    implementation 'org.bouncycastle:bcprov-debug-jdk18on'
    // https://mvnrepository.com/artifact/com.google.crypto.tink/tink
    implementation 'com.google.crypto.tink:tink:1.20.0'
    implementation 'commons-codec:commons-codec'
    // https://mvnrepository.com/artifact/dnsjava/dnsjava
    implementation 'dnsjava:dnsjava:3.6.4'
}

publishing.publications.create('maven', MavenPublication).from(components.java)
