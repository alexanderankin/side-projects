plugins {
    id 'spring-conventions'
    id 'jib-conventions'
}

dependencies {
    annotationProcessor 'org.projectlombok:lombok'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-aop'
    implementation 'io.micrometer:micrometer-tracing-bridge-brave'

    implementation 'org.apache.commons:commons-lang3'
    implementation 'net.logstash.logback:logstash-logback-encoder:8.0'

    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}


jib {
    from {
        image = 'eclipse-temurin:25-jre-alpine@sha256:f10d6259d0798c1e12179b6bf3b63cea0d6843f7b09c9f9c9c422c50e44379ec'
    }
    to {
        image = 'daveankin/alloy-example:latest'
    }
    container.entrypoint = [
            'sh',
            '-c',
            'exec java $JAVA_OPTS -cp @/app/jib-classpath-file @/app/jib-main-class-file'
    ]
}
