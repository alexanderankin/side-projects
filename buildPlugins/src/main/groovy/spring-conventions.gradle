plugins {
    id 'conventions'
}

dependencies {
    annotationProcessor platform('org.springframework.boot:spring-boot-dependencies:3.5.10')
    implementation platform('org.springframework.boot:spring-boot-dependencies:3.5.10')
    implementation platform('org.springframework.cloud:spring-cloud-dependencies:2025.0.1')

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // todo remove me when spring boot 4
    // Source: https://mvnrepository.com/artifact/org.jspecify/jspecify
    implementation 'org.jspecify:jspecify:1.0.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}
